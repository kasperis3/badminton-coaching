{% extends "base.html" %}
{% block title %}Final standings · Baddy Mixer{% endblock %}

{% block content %}
<section class="card">
  <h1>Final standings</h1>
  <p class="lead">Session complete. Great coaching!</p>

  <ol class="standings-list standings-final">
    {% for player, score in standings %}
    <li class="{% if loop.index == 1 %}top{% endif %}">
      <span class="rank">{{ loop.index }}</span>
      <span class="name">{{ player }}</span>
      <span class="pts">{{ score }} pts</span>
    </li>
    {% endfor %}
  </ol>

  <a href="{{ url_for('index') }}" class="btn btn-primary btn-block">New session</a>
</section>
{% endblock %}
